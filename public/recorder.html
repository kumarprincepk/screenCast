<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Screen Cast Recorder</title>
        <link rel="stylesheet" href="recorder.css" />
    </head>
    <body>
        <main class="shell">
            <section class="panel">
                <div class="topbar">
                    <div>
                        <p class="eyebrow">Screen Cast</p>
                        <h1>Recorder Studio</h1>
                    </div>
                    <div class="status" id="statusPill">
                        <span></span>
                        <strong id="statusText">Ready</strong>
                    </div>
                </div>

                <div class="stage">
                    <video id="preview" autoplay muted playsinline></video>
                    <div class="empty" id="emptyState">
                        <div class="emptyIcon">REC</div>
                        <h2>Choose what you want to capture</h2>
                        <p>Select an entire screen for recording that continues while you switch tabs or windows.</p>
                    </div>
                </div>

                <div class="controls">
                    <button class="primary" id="startBtn">Start Recording</button>
                    <button class="danger" id="stopBtn" disabled>Stop</button>
                    <button class="secondary" id="pauseBtn" disabled>Pause</button>
                    <button class="secondary" id="saveBtn" disabled>Save Again</button>
                </div>

                <div class="metrics">
                    <div>
                        <span>Duration</span>
                        <strong id="timer">00:00</strong>
                    </div>
                    <div>
                        <span>File</span>
                        <strong id="fileName">Not recorded yet</strong>
                    </div>
                    <div>
                        <span>Audio</span>
                        <strong id="audioState">System audio optional</strong>
                    </div>
                </div>

                <p class="message" id="message">Keep this recorder window open while recording.</p>
            </section>
        </main>

        <script src="recorder.js"></script>
    </body>
</html>
